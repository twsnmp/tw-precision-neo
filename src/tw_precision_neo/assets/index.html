<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW Precision Neo Analyst</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="libs/css/jquery.dataTables.min.css">
    <script src="libs/js/jquery.min.js"></script>
    <script src="libs/js/jquery.dataTables.min.js"></script>
    <script src="libs/js/echarts.min.js"></script>
</head>
<body>
    <header>
        <h1>TW Precision Neo Analyst <small id="version-display"></small></h1>
        <div class="controls">
            <select id="language-selector" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
            <button id="heatmap-btn" onclick="showHeatmap()">Heatmap</button>
            <button id="stats-btn" onclick="showStats()">Stats</button>
            <button id="sync-btn" onclick="syncDevice()">Sync Device</button>
            <button id="export-btn" onclick="exportCSV()">Export CSV</button>
            <button id="clear-btn" onclick="clearData()">Clear All</button>
            <span id="status">Ready</span>
        </div>
    </header>

    <main>
        <section class="dashboard">
            <div class="card chart-card">
                <h2 id="chart-title">Glucose Trends</h2>
                <div id="glucoseChart"></div>
            </div>
        </section>

        <section class="data-list">
            <h2 id="table-title">All Readings</h2>
            <table id="readings-table" class="display nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th id="th-timestamp">Timestamp</th>
                        <th id="th-value">Value</th>
                        <th id="th-unit">Unit</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>

    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="stats-title">Blood Glucose Statistics</h2>
                <span class="close-btn" onclick="hideStats()">&times;</span>
            </div>
            <div class="stats-grid">
                <div class="stats-item">
                    <label id="lbl-max">Max</label>
                    <div id="val-max" class="value">--</div>
                    <div id="time-max" class="time">--</div>
                </div>
                <div class="stats-item">
                    <label id="lbl-min">Min</label>
                    <div id="val-min" class="value">--</div>
                    <div id="time-min" class="time">--</div>
                </div>
                <div class="stats-item">
                    <label id="lbl-avg">Average</label>
                    <div id="val-avg" class="value">--</div>
                </div>
                <div class="stats-item">
                    <label id="lbl-median">Median</label>
                    <div id="val-median" class="value">--</div>
                </div>
                <div class="stats-item">
                    <label id="lbl-stddev">Std Dev</label>
                    <div id="val-stddev" class="value">--</div>
                </div>
                <div class="stats-item">
                    <label id="lbl-count">Count</label>
                    <div id="val-count" class="value">--</div>
                </div>
            </div>
            <div id="statsChart"></div>
        </div>
    </div>

    <div id="heatmap-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="heatmap-title">Glucose Heatmap</h2>
                <div class="modal-controls">
                    <select id="heatmap-metric" onchange="renderHeatmap()">
                        <option value="count">Count</option>
                        <option value="average">Average</option>
                    </select>
                    <span class="close-btn" onclick="hideHeatmap()">&times;</span>
                </div>
            </div>
            <div id="heatmapChart"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
