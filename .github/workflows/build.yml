name: Build and Package Windows
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package-windows:
    name: Package for Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - name: Get Version
        id: vars
        run: |
          # Use the tag that triggered the workflow
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create and Build App
        run: |
          briefcase create windows --no-input -C 'version="${{ steps.vars.outputs.VERSION }}"'
          briefcase build windows --no-input -C 'version="${{ steps.vars.outputs.VERSION }}"'

      - name: Package (MSI)
        run: |
          briefcase package windows -p msi --no-input -C 'version="${{ steps.vars.outputs.VERSION }}"'

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Upload Artifact to Action
        uses: actions/upload-artifact@v4
        with:
          name: Windows-package
          path: |
            dist/*.msi
            dist/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
