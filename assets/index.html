<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW Precision Neo Analyst</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <header>
        <h1>TW Precision Neo Analyst</h1>
        <div class="controls">
            <button id="sync-btn" onclick="syncDevice()">Sync Device</button>
            <button id="import-btn" onclick="importCSV()">Import readings.csv</button>
            <span id="status">Ready</span>
        </div>
    </header>

    <main>
        <section class="dashboard">
            <div class="card chart-card">
                <h2>Glucose Trends</h2>
                <div id="glucoseChart"></div>
            </div>
        </section>

        <section class="data-list">
            <h2>All Readings</h2>
            <table id="readings-table" class="display nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Value</th>
                        <th>Unit</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
