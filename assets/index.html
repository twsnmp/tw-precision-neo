<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW Precision Neo Analyst</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>TW Precision Neo Analyst</h1>
        <div class="controls">
            <button id="sync-btn" onclick="syncDevice()">Sync Device</button>
            <button id="import-btn" onclick="importCSV()">Import readings.csv</button>
            <span id="status">Ready</span>
        </div>
    </header>

    <main>
        <section class="dashboard">
            <div class="card">
                <h2>Time in Range (70-140)</h2>
                <div id="tir-value">--%</div>
            </div>
            <div class="card chart-container">
                <h2>Glucose Trends</h2>
                <canvas id="glucoseChart"></canvas>
            </div>
        </section>

        <section class="data-list">
            <h2>Recent Readings</h2>
            <table id="readings-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Value</th>
                        <th>Unit</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
