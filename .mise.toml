[tools]
python = "3.14"

[env]
PYTHONPATH = "src:."

[tasks.setup]
description = "Setup development environment"
run = """
python -m venv .venv
.venv/bin/pip install --upgrade pip
.venv/bin/pip install briefcase pytest
.venv/bin/pip install -r requirements.txt
"""

[tasks.test]
description = "Run tests"
run = ".venv/bin/pytest"

[tasks.build]
description = "Build the application"
run = ".venv/bin/briefcase build"

[tasks.dev]
description = "Run the application in dev mode"
run = ".venv/bin/briefcase dev"

[tasks.release-mac]
description = "Package and Notarize the application for macOS release (PKG)"
run = """
if [ -z "$DELELOPER_ID_APPLICATION" ]; then
    .venv/bin/briefcase package macOS -p pkg
else
    .venv/bin/briefcase package macOS -p pkg --identity "$DELELOPER_ID_APPLICATION"
fi
"""

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf build logs .venv"
