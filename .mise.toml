[tools]
python = "3.14"

[env]
PYTHONPATH = "src:."

[tasks.setup]
description = "Setup development environment"
run = """
python -m venv .venv
.venv/bin/pip install --upgrade pip
.venv/bin/pip install briefcase pytest
.venv/bin/pip install -r requirements.txt
"""

[tasks.test]
description = "Run tests"
run = ".venv/bin/pytest"

[tasks.build]
description = "Build the application"
run = ".venv/bin/briefcase build"

[tasks.dev]
description = "Run the application in dev mode"
run = ".venv/bin/briefcase dev"

[tasks.release-mac]
description = "Package and Notarize the application for macOS release"
run = """
echo "Enter your Apple Developer ID Application identity (e.g., 'Developer ID Application: Name (ID)'):"
read IDENTITY
if [ -z "$IDENTITY" ]; then
    echo "Error: Identity is required for formal release."
    exit 1
fi
.venv/bin/briefcase package macOS dmg --identity "$IDENTITY" --notarize-wait
"""

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf build logs .venv"
