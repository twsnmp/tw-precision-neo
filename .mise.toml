[tools]
python = "3.14"

[env]
PYTHONPATH = "src:."

[tasks.setup]
description = "Setup development environment"
run = """
python -m venv .venv
.venv/bin/pip install --upgrade pip
.venv/bin/pip install briefcase pytest
.venv/bin/pip install -r requirements.txt
"""

[tasks.test]
description = "Run tests"
run = ".venv/bin/pytest"

[tasks.build]
description = "Build the application"
run = ".venv/bin/briefcase build"

[tasks.dev]
description = "Run the application in dev mode"
run = ".venv/bin/briefcase dev"

[tasks.release-mac]
description = "Package and Notarize the application for macOS release (PKG)"
run = """
APP_ID="$DEVELOPER_ID_APPLICATION"
INST_ID="$DEVELOPER_ID_INSTALLER"

echo "Building for macOS..."
.venv/bin/briefcase build macOS --no-input

echo "Cleaning up problematic object files for notarization..."
# Delete any .o files in the Python framework that cause notarization failures
find build/tw_precision_neo/macos/app/TW\\ Precision\\ Neo\\ Analyst.app -name "*.o" -delete

if [ -n "$APP_ID" ] && [ -n "$INST_ID" ]; then
    .venv/bin/briefcase package macOS -p pkg --identity "$APP_ID" --installer-identity "$INST_ID"
else
    echo "Developer identities not fully set. Briefcase will show a selection list."
    .venv/bin/briefcase package macOS -p pkg
fi
"""

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf build logs .venv"
